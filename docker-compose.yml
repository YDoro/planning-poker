
services:
  app:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_USE_FIRESTORE_EMULATOR=true
    depends_on:
      - firestore-emulator

  firestore-emulator:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    ports:
      - "8080:8080"
    volumes:
      - ./firebase.json:/app/firebase.json
      - ./firebase-emulators:/app/firebase-emulators
